repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
      - id: end-of-file-fixer
        exclude: |
          (?x)^tests/(
              snapshots |
              test_integration/test_cli/snapshots
          )/
      - id: trailing-whitespace
        exclude: |
          (?x)^tests/(
              snapshots |
              test_integration/test_cli/snapshots
          )/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.14.10"
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: generate-diagram-specs
        name: Generate Diagram Specs
        entry: python docs/scripts/generate_diagram_spec_docs.py
        language: system
        pass_filenames: false
        files: ^c4/converters/json/schemas\.py$
