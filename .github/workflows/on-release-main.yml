name: release-main

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest

    outputs:
      bumped: ${{ steps.bump_check.outputs.bumped }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create bump and changelog
        id: cz
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog_increment_filename: body.md

      - name: Detect if version was bumped
        id: bump_check
        shell: bash
        run: |
          prev='${{ steps.cz.outputs.previous_version }}'
          next='${{ steps.cz.outputs.next_version }}'
          echo "previous=$prev"
          echo "next=$next"

          if [[ -n "$prev" && -n "$next" && "$prev" != "$next" ]]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        if: steps.bump_check.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v1
        with:
          body_path: body.md
          tag_name: ${{ env.REVISION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: needs.bump-version.outputs.bumped == 'true'

    steps:
      - name: Check out bumped main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Download updated pyproject.toml
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
